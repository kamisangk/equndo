# git-cliff 配置
# 文档：https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

所有版本的变更记录。beta / rc 版本提交在 stable 发版时会折叠并入对应 stable 版本。

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim | upper_first }}\
{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/pull/{{ commit.remote.pr_number }}))\
{% endif %}\
{% if commit.remote.username %} by @{{ commit.remote.username }}\
{% endif %}
{% endfor %}
{% endfor %}
{% if previous and previous.version and version %}

**Full Changelog**: https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ previous.version }}...{{ version }}
{% endif %}

"""
footer = ""
trim = true
render_always = true
postprocessors = [
    # 把裸 close/fix/resolve #N 转成 issue 链接
    { pattern = '(?i)\b(close[sd]?|fix(es|ed)?|resolve[sd]?)\s+#(\d+)', replace = "$1 [#$3](https://github.com/lingyan000/fluxdo/issues/$3)" },
]

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false
filter_commits = true
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"
topo_order = false
topo_order_commits = true
use_branch_tags = false
recurse_submodules = false

# 预处理：先把 emoji 前缀标准化为 conventional commits 形式，
# parser 后续只匹配 conventional 形式，避免双轨复杂度
commit_preprocessors = [
    { pattern = '^✨\s*', replace = "feat: " },
    { pattern = '^🐛\s*', replace = "fix: " },
    { pattern = '^♻️\s*', replace = "refactor: " },
    { pattern = '^⚡\s*', replace = "perf: " },
    { pattern = '^📝\s*', replace = "docs: " },
    { pattern = '^📚\s*', replace = "docs: " },
    { pattern = '^✅\s*', replace = "test: " },
    { pattern = '^📦\s*', replace = "chore(deps): " },
    { pattern = '^🎨\s*', replace = "style: " },
    # 移除尾部 (#NNN) —— cliff 会通过 GitHub API 自动注入 PR 链接，避免重复
    { pattern = '\s*\(#\d+\)\s*$', replace = "" },
]

# 解析顺序：先 skip 噪音 → BREAKING 优先 → 各业务分组 → 兜底
commit_parsers = [
    # === 噪音 skip ===
    { message = "^Update changelog", skip = true },
    { message = "^chore\\(changelog\\)", skip = true },
    { message = "^chore:?\\s*bump version", skip = true },
    { message = "^Merge (pull request|branch|remote-tracking)", skip = true },
    { message = "Co-Authored-By: Release Script", skip = true },
    { message = "^fix:\\s*CI(\\s+修复|\\s+更新日志修复)?\\s*$", skip = true },
    { message = "^fix:\\s*修复开发环境问题\\s*$", skip = true },

    # === 破坏性变更（最高优先级） ===
    { body = ".*BREAKING CHANGE", group = "<!-- 0 -->💥 破坏性变更" },
    { message = "^[a-z]+(\\(.+\\))?!:", group = "<!-- 0 -->💥 破坏性变更" },

    # === 业务分组 ===
    { message = "^feat", group = "<!-- 1 -->🌟 新功能" },
    { message = "^fix", group = "<!-- 2 -->🐛 修复" },
    { message = "^perf", group = "<!-- 3 -->⚡ 性能" },
    { message = "^refactor", group = "<!-- 4 -->♻️ 重构" },
    { message = "^docs", group = "<!-- 5 -->📝 文档" },
    { message = "^test", group = "<!-- 6 -->✅ 测试" },
    { message = "^chore\\(deps", group = "<!-- 7 -->📦 依赖更新" },
    { message = "^style", group = "<!-- 8 -->🎨 样式" },

    # === 兜底 ===
    { message = ".*", group = "<!-- 9 -->🔧 其他" },
]

link_parsers = []

[remote.github]
owner = "lingyan000"
repo = "fluxdo"
