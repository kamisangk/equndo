app-id: com.github.lingyan000.fluxdo.WpeLayer
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: true
separate-locales: false
modules:
  - name: unifdef
    no-autogen: true
    make-install-args:
      - prefix=${FLATPAK_DEST}
    sources:
      - type: archive
        url: https://dotat.at/prog/unifdef/unifdef-2.12.tar.gz
        sha256: fba564a24db7b97ebe9329713ac970627b902e5e9e8b14e19e024eb6e278d10b
    cleanup:
      - '*'

  - name: woff2
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_C_FLAGS_RELEASE=-DNDEBUG
      - -DCMAKE_CXX_FLAGS_RELEASE=-DNDEBUG
    sources:
      - type: archive
        url: https://github.com/google/woff2/archive/v1.0.2.tar.gz
        sha256: add272bb09e6384a4833ffca4896350fdb16e0ca22df68c0384773c67a175594

  - name: libwpe
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_C_FLAGS_RELEASE=-DNDEBUG
      - -DCMAKE_CXX_FLAGS_RELEASE=-DNDEBUG
    sources:
      - type: archive
        url: https://wpewebkit.org/releases/libwpe-1.16.3.tar.xz
        sha256: c880fa8d607b2aa6eadde7d6d6302b1396ebc38368fe2332fa20e193c7ee1420

  - name: wpebackend-fdo
    buildsystem: meson
    config-opts:
      - -Dbuildtype=release
      - -Ddefault_library=shared
    sources:
      - type: archive
        url: https://wpewebkit.org/releases/wpebackend-fdo-1.16.1.tar.xz
        sha256: 544ae14012f8e7e426b8cb522eb0aaaac831ad7c35601d1cf31d37670e0ebb3b

  - name: wpewebkit
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DPORT=WPE
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_C_FLAGS_RELEASE=-DNDEBUG
      - -DCMAKE_CXX_FLAGS_RELEASE=-DNDEBUG
      - -DUSE_SKIA_OPENTYPE_SVG=OFF
      - -DUSE_SYSPROF_CAPTURE=OFF
      - -DUSE_LIBBACKTRACE=OFF
      - -DENABLE_WPE_PLATFORM=ON
      - -DENABLE_BUBBLEWRAP_SANDBOX=OFF
      - -DENABLE_WPE_PLATFORM_DRM=OFF
      - -DENABLE_SPEECH_SYNTHESIS=OFF
      - -DENABLE_DOCUMENTATION=OFF
      - -DENABLE_MINIBROWSER=OFF
    build-options:
      append-path: /usr/lib/sdk/llvm20/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      cflags: -g1
      cxxflags: -g1
    sources:
      - type: archive
        url: https://wpewebkit.org/releases/wpewebkit-2.48.7.tar.xz
        sha256: cecf49844dfba7ccf53d64b32cb8cf2cbd69eb5ec9080b1c6e52f9d1ee87b690
